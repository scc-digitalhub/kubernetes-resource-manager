apiVersion: v1
kind: Service
metadata:
  name: httproute-webhook
  namespace: httproute-webhook
  labels:
    app.kubernetes.io/name: httproute-webhook
    app.kubernetes.io/component: admission-webhook
spec:
  selector:
    app: httproute-webhook
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
